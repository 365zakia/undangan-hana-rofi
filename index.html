<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Hana & Rofi</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="hero">
        <div class="content">
            <p class="sub-title animate-fade delay-1">UNDANGAN PERNIKAHAN</p>
            <h1 class="nama animate-fade delay-2">Hana<br>&<br>Rofi</h1>
            <p class="invite-text animate-fade delay-3">MENGUNDANG ANDA UNTUK HADIR<br>PADA PERNIKAHAN KAMI</p>
            <button class="btn">Buka Undangan</button>
        </div>
    </section>
    <section id="main-content" class="main-page hidden">
    <img src="assets/bunga-atas.png" class="deco-top anim-top" alt="decoration">

    <div class="inner-content">
        <h2 class="title-page anim-fade">Hana & Rofi</h2>
        <p class="date-page anim-fade">04.04.2026</p>
        
        <div class="char-container anim-bottom">
            <img src="assets/bunga-bawah-karakter.png" class="char-img" alt="Hana Rofi">
        </div>
    </div>
</section>

<script>
    const openBtn = document.querySelector('.btn');
    const heroSection = document.querySelector('.hero');
    const mainSection = document.querySelector('#main-content');

    openBtn.addEventListener('click', function() {
        // 1. Hilangkan Cover (Hero)
        heroSection.style.opacity = '0';
        heroSection.style.transition = '0.8s';
        
        setTimeout(() => {
            heroSection.classList.add('hidden');
            
            // 2. Munculkan Halaman Utama
            mainSection.classList.remove('hidden');
            
            // 3. Picu Animasi (Bunga & Karakter masuk)
            setTimeout(() => {
                mainSection.classList.add('show-anim');
            }, 100);
        }, 800);
    });
</script>
</body>

</html>
