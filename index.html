<style><!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: serif;
  overflow: hidden;
}

/* Cover */
.cover {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #f8d9e3;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 2;
}

button {
  padding: 12px 25px;
  border: none;
  background: #c06a86;
  color: white;
  font-size: 16px;
  cursor: pointer;
  border-radius: 30px;
}

/* Video */
.bg-video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  z-index: -1;
}
</style>
</head>

<body>

<div class="cover" id="cover">
  <h2>The Wedding Of</h2>
  <h1>Aisha & Rahman</h1>
  <button onclick="openInvite()">Open Invitation</button>
</div>

<video autoplay muted loop class="bg-video" id="video">
  <source src="halaman1.mp4" type="video/mp4">
</video>

<script>
function openInvite() {
  document.getElementById("cover").style.display = "none";
  document.getElementById("video").style.display = "block";
}
</script>

</body>
</html>

  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
}

.bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<video autoplay muted loop class="bg-video">
  <source src="halaman1.mp4" type="video/mp4">
</video>

</body>
</html>
